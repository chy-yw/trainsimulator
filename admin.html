<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理後台 — 列車建模</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <div class="login-overlay" id="login-overlay">
    <div class="login-box">
      <h2>管理員登入</h2>
      <p id="login-hint">使用 Firebase 帳號登入（請先在 Firebase Console 建立管理員帳號）</p>
      <input type="email" id="login-email" placeholder="管理員 Email" autocomplete="username">
      <input type="password" id="login-password" placeholder="密碼" autocomplete="current-password">
      <button class="btn btn-primary" id="login-btn" type="button" style="width:100%">登入</button>
      <p class="hint" id="firebase-setup-hint" style="margin-top:12px;font-size:0.8rem">
        尚未設定 Firebase？請編輯 <code>js/firebase-config.js</code> 並完成 Firebase 專案設定。
      </p>
    </div>
  </div>

  <div class="admin-app hidden" id="admin-app">
    <header class="admin-header">
      <div>
        <h1>列車建模 · 管理後台</h1>
        <p>上傳圖片、編輯尺寸，儲存到 Firebase 讓所有使用者同步看到更新</p>
      </div>
      <div class="admin-actions">
        <a class="btn btn-ghost" href="index.html">返回模擬器</a>
        <button class="btn btn-ghost" id="logout-btn" type="button">登出</button>
        <button class="btn btn-ghost" id="import-zip-btn" type="button">匯入 ZIP</button>
        <button class="btn btn-primary" id="save-cloud-btn" type="button">儲存到雲端</button>
        <button class="btn btn-ghost" id="export-zip-btn" type="button">匯出 ZIP 備份</button>
      </div>
    </header>

    <main class="admin-main">
      <div class="admin-notice" id="admin-notice">
        <strong>Firebase 雲端儲存：</strong>所有資料僅儲存在雲端。編輯後請按「儲存到雲端」，模擬器才會同步更新。
      </div>

      <section class="admin-section">
        <div class="admin-section-header">
          <h2>背景（Background）</h2>
          <button class="btn btn-ghost" id="add-bg-btn" type="button">+ 新增背景</button>
        </div>
        <div class="admin-grid" id="bg-list"></div>
      </section>

      <section class="admin-section">
        <div class="admin-section-header">
          <h2>組件（Items）</h2>
          <button class="btn btn-ghost" id="add-item-btn" type="button">+ 新增組件</button>
        </div>
        <div class="admin-grid" id="item-list"></div>
      </section>
    </main>
  </div>

  <input type="file" id="import-zip-input" accept=".zip,application/zip" class="hidden">
  <input type="file" id="upload-image-input" accept="image/*" class="hidden">
  <div class="toast" id="toast"></div>

  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-storage-compat.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/firebase-store.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
